name: Build Windows EXE

# Compile InstagramOps en .exe Windows sur un runner Windows GitHub (gratuit).
# Le code source reste dans le repo (prive) ; seul l'.exe est telecharge.
#
# Declenchement : manuel (onglet Actions -> Build Windows EXE -> Run workflow)
# ou a chaque tag "v*".
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nuitka flask flask-cors requests

      - name: Build with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --output-dir=dist `
            --output-filename=InstagramOps.exe `
            --include-module=insta_core `
            --include-module=worker `
            --include-data-files=panel.html=panel.html `
            --include-package=flask `
            --include-package=flask_cors `
            --include-package=requests `
            --assume-yes-for-downloads `
            --remove-output `
            server.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InstagramOps-windows
          path: dist/InstagramOps.exe
